---
name: "Feature request"
description: "Suggest an idea for FusionSolarPlus."
labels: ["feature request"]
body:
- type: markdown
  attributes:
    value: Before you open a new feature request, search through the existing feature requests to see if others have had the same idea. [Click here to search.](https://github.com/JortvanSchijndel/FusionSolarPlus/issues?q=is%3Aissue%20label%3A"feature%20request")
- type: checkboxes
  attributes:
    label: Checklist
    options:
      - label: I have filled out the template to the best of my ability.
        required: true
      - label: This only contains 1 feature request (if you have multiple feature requests, open one feature request for each feature request).
        required: true
      - label: This issue is not a duplicate feature request of previous feature requests.
        required: true
- type: textarea
  attributes:
    label: "Describe your feature request"
    description: "A clear and concise description of what the current problem is and why your feature request will help solve it."
  validations:
    required: true
- type: textarea
  attributes:
    label: "Additional context"
    description: "Add any other context or screenshots about the feature request here."
  validations:
    required: true
