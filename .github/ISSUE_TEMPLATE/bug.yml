---
name: "Bug report"
description: "Report a bug with FusionSolarPlus."
labels: ["bug"]
body:
- type: markdown
  attributes:
    value: Before you open a new issue, search through the existing issues to see if others have had the same problem. [Click here to search.](https://github.com/JortvanSchijndel/FusionSolarPlus/issues?q=is%3Aissue%20label%3Abug)
- type: checkboxes
  attributes:
    label: Checklist
    options:
      - label: I have filled out the issue template to the best of my ability.
        required: true
      - label: This issue only contains 1 issue (if you have multiple issues, open one issue for each issue).
        required: true
      - label: This issue is not a duplicate issue of any previous issues.
        required: true
- type: input
  attributes:
    label: "Version"
    description: "Which version of FusionSolarPlus are you using"
  validations:
    required: true
- type: textarea
  attributes:
    label: "Devices"
    description: "List the devices that you are using."
  validations:
    required: true
- type: textarea
  attributes:
    label: "Describe the issue"
    description: "A clear and concise description of what the issue is."
  validations:
    required: true
- type: textarea
  attributes:
    label: Reproduction steps
    description: "Without steps to reproduce, it will be hard to fix. It is very important that you fill out this part."
    value: |
      1.
      2.
      3.
      ...
  validations:
    required: true
- type: textarea
  attributes:
    label: "Debug logs"
    description: "To enable debug logs check this https://www.home-assistant.io/integrations/logger/."
    render: text
    value: |
      ```
      Paste logs here
      ```
  validations:
    required: true
